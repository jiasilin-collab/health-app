name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install root dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: health-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: health-app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Build Summary
        run: |
          echo "## APK 构建完成 :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 下载链接" >> $GITHUB_STEP_SUMMARY
          echo "- **Debug APK**: 点击 Actions 运行页面底部的 Artifacts 下载" >> $GITHUB_STEP_SUMMARY
          echo "- **Release APK**: 点击 Actions 运行页面底部的 Artifacts 下载" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 注意事项" >> $GITHUB_STEP_SUMMARY
          echo "Release APK 是未签名的版本，如需正式发布需要进行签名" >> $GITHUB_STEP_SUMMARY
