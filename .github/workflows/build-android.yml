name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 配置 npm 镜像源
      - name: Configure npm registry
        run: npm config set registry https://registry.npmmirror.com

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps --registry=https://registry.npmmirror.com

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install root dependencies
        run: npm ci --registry=https://registry.npmmirror.com

      - name: Configure Gradle with mirror
        run: |
          cd android
          echo "distributionUrl=https://mirrors.cloud.tencent.com/gradle/gradle-8.14.3-all.zip" > gradle.properties
          echo "GRADLE_OPTS=-Dgradle.user.home=$HOME/.gradle" >> $GITHUB_ENV
          echo "GRADLE_USER_HOME=$HOME/.gradle" >> $GITHUB_ENV

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK with retry
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --no-parallel --refresh-dependencies || echo "Build failed, retrying..." || sleep 10 || echo "Retry 1" || sleep 10 || echo "Retry 2" || sleep 10 || ./gradlew assembleDebug --no-daemon --no-parallel --refresh-dependencies
        env:
          GRADLE_OPTS: -Dgradle.user.home=$HOME/.gradle
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Build Release APK with retry
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --no-parallel --refresh-dependencies || echo "Build failed, retrying..." || sleep 10 || echo "Retry 1" || sleep 10 || echo "Retry 2" || sleep 10 || ./gradlew assembleRelease --no-daemon --no-parallel --refresh-dependencies
        env:
          GRADLE_OPTS: -Dgradle.user.home=$HOME/.gradle
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: health-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: health-app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Build Summary
        if: always()
        run: |
          echo "## 📱 APK 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "### ✅ 构建成功" >> $GITHUB_STEP_SUMMARY
            echo "- **Debug APK**: 点击 Actions 运行页面底部的 Artifacts 下载" >> $GITHUB_STEP_SUMMARY
            echo "- **Release APK**: 点击 Actions 运行页面底部的 Artifacts 下载" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
            echo "请检查错误日志，或点击 Re-run jobs 重试" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 注意事项" >> $GITHUB_STEP_SUMMARY
          echo "Release APK 是未签名的版本，如需正式发布需要进行签名" >> $GITHUB_STEP_SUMMARY
